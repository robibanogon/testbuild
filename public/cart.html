<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Gadget Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🛒 Gadget Store</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/products">Products</a></li>
                <li><a href="/cart" class="cart-link active">
                    Cart <span class="cart-count" id="cartCount">0</span>
                </a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="cart-page">
            <h2>Shopping Cart</h2>
            
            <div id="cartContent">
                <!-- Cart items will be loaded here -->
            </div>

            <div class="cart-summary" id="cartSummary" style="display: none;">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <a href="/checkout" class="btn btn-primary btn-block">Proceed to Checkout</a>
                <button class="btn btn-secondary btn-block" onclick="clearCart()">Clear Cart</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Gadget Store. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        function displayCart() {
            const cart = getCart();
            const cartContent = document.getElementById('cartContent');
            const cartSummary = document.getElementById('cartSummary');
            
            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="empty-cart">
                        <h3>Your cart is empty</h3>
                        <p>Add some products to get started!</p>
                        <a href="/products" class="btn btn-primary">Browse Products</a>
                    </div>
                `;
                cartSummary.style.display = 'none';
                return;
            }
            
            cartSummary.style.display = 'block';
            
            cartContent.innerHTML = `
                <div class="cart-items">
                    ${cart.map(item => `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <h4>${item.name}</h4>
                                <p class="cart-item-price">$${parseFloat(item.price).toFixed(2)}</p>
                            </div>
                            <div class="cart-item-controls">
                                <div class="quantity-controls">
                                    <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                </div>
                                <p class="cart-item-total">$${(item.price * item.quantity).toFixed(2)}</p>
                                <button class="btn-remove" onclick="removeFromCart(${item.id})">Remove</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            updateCartSummary();
        }
        
        function updateCartSummary() {
            const cart = getCart();
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.10;
            const total = subtotal + tax;
            
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }
        
        function updateQuantity(productId, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(productId);
                return;
            }
            
            const cart = getCart();
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity = newQuantity;
                saveCart(cart);
                displayCart();
                updateCartCount();
            }
        }
        
        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                localStorage.removeItem('cart');
                displayCart();
                updateCartCount();
            }
        }
        
        // Initialize
        displayCart();
        updateCartCount();
    </script>
</body>
</html>
